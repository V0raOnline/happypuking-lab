# ─────────────────────────────────────────────────────────────
# PLANTILLA DE ORACIONES — hAppYpUkIng · Morfosintaxis ESO
# ─────────────────────────────────────────────────────────────
# Este fichero es una PLANTILLA DE EJEMPLO para crear bancos
# de oraciones personalizados. NO es la fuente de verdad —
# las oraciones por defecto están embebidas en sintaxis.html.
#
# USO: copia este fichero, edita las oraciones, y cárgalo
# en la herramienta con el botón "Cargar mis oraciones".
#
# CAMPOS OBLIGATORIOS POR ORACIÓN:
#   id       → número único
#   nivel    → 1 (básico) a 4 (avanzado)
#   texto    → la oración completa como string
#   tokens   → lista de palabras con categoria y funcion
#   pasos    → lista de pasos con busca, pista y tokens_correctos
#
# CAMPOS OPCIONALES:
#   nota     → descripción pedagógica (aparece en cursiva)
#   trampa   → error frecuente asociado (aparece en amarillo)
# ─────────────────────────────────────────────────────────────

oraciones:

  - id: 1
    nivel: 1
    texto: "Mi perro compró un libro ayer."
    nota: "Oración básica. Introduce sujeto con CN adjetival, CD, CCT."
    trampa: "Distinguir el determinante 'mi' del pronombre 'mí'."
    tokens:
      - palabra: "Mi"
        categoria: determinante
        subtipo: posesivo
        funcion: determinante
        sintagma: SN-sujeto
      - palabra: "perro"
        categoria: sustantivo
        subtipo: comun
        funcion: nucleo-sujeto
        sintagma: SN-sujeto
      - palabra: "compró"
        categoria: verbo
        subtipo: transitivo
        funcion: nucleo-SV
        sintagma: SV
      - palabra: "un"
        categoria: determinante
        subtipo: articulo-indefinido
        funcion: determinante
        sintagma: SN-CD
      - palabra: "libro"
        categoria: sustantivo
        subtipo: comun
        funcion: nucleo-CD
        sintagma: SN-CD
      - palabra: "ayer"
        categoria: adverbio
        subtipo: tiempo
        funcion: CCT
        sintagma: SAdv-CCT
    pasos:
      - id: 1
        busca: verbo
        pista: "¿Qué acción ocurre en esta oración? Busca la palabra que indica lo que se hace."
        tokens_correctos: ["compró"]
        feedback_ok: "Perfecto. 'Compró' es el verbo: núcleo del predicado verbal."
        feedback_error: "Piensa en qué acción describe la oración. ¿Quién hace qué?"
      - id: 2
        busca: sujeto
        pista: "Pregúntale al verbo: ¿quién compró? El sujeto incluye el sustantivo y todo lo que lo acompaña."
        tokens_correctos: ["Mi", "perro"]
        feedback_ok: "Exacto. El sujeto es todo el sintagma nominal: determinante + sustantivo + adjetivo."
        feedback_error: "El sujeto no es solo 'perro'. Incluye el determinante y el adjetivo que lo acompañan."
      - id: 3
        busca: CD
        pista: "¿Qué compró? El complemento directo responde a esa pregunta. Prueba a sustituirlo por 'lo'."
        tokens_correctos: ["un", "libro"]
        feedback_ok: "Correcto. 'Un libro' es el CD — se puede sustituir por 'lo': 'lo compró'."
        feedback_error: "Pregúntale al verbo: ¿compró qué? ¿Puedes sustituirlo por 'lo'?"
      - id: 4
        busca: CCT
        pista: "¿Cuándo ocurrió la acción? Busca el complemento circunstancial de tiempo."
        tokens_correctos: ["ayer"]
        feedback_ok: "'Ayer' es el CCT. Los adverbios de tiempo suelen cumplir esta función."
        feedback_error: "¿Cuándo compró el libro? Esa palabra indica el tiempo de la acción."

  - id: 2
    nivel: 1
    texto: "La circulación por la carretera principal es muy peligrosa."
    nota: "Predicado nominal. Sujeto con CN preposicional anidado. Atributo con cuantificador."
    trampa: "El CN 'por la carretera principal' parece CCL pero pertenece al SN sujeto."
    tokens:
      - palabra: "La"
        categoria: determinante
        subtipo: articulo-definido
        funcion: determinante
        sintagma: SN-sujeto
      - palabra: "circulación"
        categoria: sustantivo
        subtipo: comun
        funcion: nucleo-sujeto
        sintagma: SN-sujeto
      - palabra: "por"
        categoria: preposicion
        subtipo: null
        funcion: nexo-CN
        sintagma: SPrep-CN
      - palabra: "la"
        categoria: determinante
        subtipo: articulo-definido
        funcion: determinante
        sintagma: SPrep-CN
      - palabra: "carretera"
        categoria: sustantivo
        subtipo: comun
        funcion: nucleo-CN
        sintagma: SPrep-CN
      - palabra: "principal"
        categoria: adjetivo
        subtipo: calificativo
        funcion: CN
        sintagma: SPrep-CN
      - palabra: "es"
        categoria: verbo
        subtipo: copulativo
        funcion: nucleo-SV
        sintagma: SV
      - palabra: "muy"
        categoria: adverbio
        subtipo: cantidad
        funcion: cuantificador-atributo
        sintagma: SAdj-atributo
      - palabra: "peligrosa"
        categoria: adjetivo
        subtipo: calificativo
        funcion: nucleo-atributo
        sintagma: SAdj-atributo
    pasos:
      - id: 1
        busca: verbo
        pista: "¿Qué palabra une el sujeto con su característica? En oraciones copulativas el verbo es 'ser', 'estar' o 'parecer'."
        tokens_correctos: ["es"]
        feedback_ok: "Sí. 'Es' es un verbo copulativo: une el sujeto con el atributo."
        feedback_error: "Busca 'ser', 'estar' o 'parecer'. El verbo copulativo actúa como nexo."
      - id: 2
        busca: sujeto
        pista: "¿De qué se habla en la oración? El sujeto incluye todo su sintagma, aunque tenga complementos dentro."
        tokens_correctos: ["La", "circulación", "por", "la", "carretera", "principal"]
        feedback_ok: "Correcto. El sujeto es todo el SN: 'La circulación por la carretera principal'. El SP 'por la carretera principal' es un CN, no un CCL."
        feedback_error: "Ojo: 'por la carretera principal' no es un CCL, es un CN que complementa a 'circulación'. Todo el bloque es el sujeto."
      - id: 3
        busca: atributo
        pista: "En una oración copulativa, el atributo dice cómo es el sujeto. ¿Cómo es la circulación?"
        tokens_correctos: ["muy", "peligrosa"]
        feedback_ok: "Exacto. 'Muy peligrosa' es el atributo. Incluye el adverbio cuantificador 'muy' dentro del SAdj."
        feedback_error: "El atributo no es solo 'peligrosa'. ¿Qué más acompaña al adjetivo en ese sintagma?"

  - id: 3
    nivel: 2
    texto: "A mis padres les encanta esa película estadounidense."
    nota: "Verbo tipo 'gustar'. Sujeto pospuesto. CI duplicado."
    trampa: "Los alumnos identifican 'a mis padres' como sujeto. La prueba de concordancia revela que el sujeto es 'esa película'."
    tokens:
      - palabra: "A"
        categoria: preposicion
        subtipo: null
        funcion: nexo-CI
        sintagma: SPrep-CI
      - palabra: "mis"
        categoria: determinante
        subtipo: posesivo
        funcion: determinante
        sintagma: SPrep-CI
      - palabra: "padres"
        categoria: sustantivo
        subtipo: comun
        funcion: nucleo-CI
        sintagma: SPrep-CI
      - palabra: "les"
        categoria: pronombre
        subtipo: personal-atono
        funcion: CI-duplicado
        sintagma: SV
      - palabra: "encanta"
        categoria: verbo
        subtipo: transitivo
        funcion: nucleo-SV
        sintagma: SV
      - palabra: "esa"
        categoria: determinante
        subtipo: demostrativo
        funcion: determinante
        sintagma: SN-sujeto
      - palabra: "película"
        categoria: sustantivo
        subtipo: comun
        funcion: nucleo-sujeto
        sintagma: SN-sujeto
      - palabra: "estadounidense"
        categoria: adjetivo
        subtipo: calificativo
        funcion: CN
        sintagma: SN-sujeto
    pasos:
      - id: 1
        busca: verbo
        pista: "¿Qué acción o estado describe la oración?"
        tokens_correctos: ["encanta"]
        feedback_ok: "Correcto. 'Encanta' es el núcleo verbal."
        feedback_error: "Busca la palabra que expresa el estado o acción principal."
      - id: 2
        busca: sujeto
        pista: "Prueba la concordancia: cambia el sujeto a plural y comprueba si el verbo cambia también. ¿'Les encantan...' qué?"
        tokens_correctos: ["esa", "película", "estadounidense"]
        feedback_ok: "Exacto. 'Esa película' es el sujeto, aunque aparezca al final. Prueba: 'les encantan esas películas' → el verbo concuerda con 'películas', no con 'padres'."
        feedback_error: "¡Trampa clásica! 'A mis padres' parece el sujeto pero no lo es. Prueba: ¿'les encantan los padres'? No tiene sentido. El sujeto es lo que concuerda con el verbo."
      - id: 3
        busca: CI
        pista: "¿A quiénes les encanta? El CI puede aparecer duplicado: una forma tónica ('a mis padres') y una átona ('les')."
        tokens_correctos: ["A", "mis", "padres", "les"]
        feedback_ok: "Perfecto. El CI está duplicado: 'a mis padres' (forma tónica) y 'les' (pronombre átono). Ambos son CI."
        feedback_error: "El CI responde a '¿a quién?' o '¿para quién?'. Aquí aparece dos veces: una explícita y una como pronombre."

  - id: 4
    nivel: 2
    texto: "Las pruebas fueron analizadas cuidadosamente por los investigadores del laboratorio."
    nota: "Oración pasiva. Sujeto paciente. Complemento agente. CCM adverbio."
    trampa: "El alumno puede confundir el sujeto paciente con CD, o el complemento agente con un CCL."
    tokens:
