        subtipo: modo
        funcion: CCM
        sintagma: SAdv-CCM
      - palabra: "por"
        categoria: preposicion
        subtipo: null
        funcion: nexo-CAg
        sintagma: SPrep-CAg
      - palabra: "los"
        categoria: determinante
        subtipo: articulo-definido
        funcion: determinante
        sintagma: SPrep-CAg
      - palabra: "investigadores"
        categoria: sustantivo
        subtipo: comun
        funcion: nucleo-CAg
        sintagma: SPrep-CAg
      - palabra: "del"
        categoria: preposicion
        subtipo: contracta
        funcion: nexo-CN
        sintagma: SPrep-CN
      - palabra: "laboratorio"
        categoria: sustantivo
        subtipo: comun
        funcion: nucleo-CN
        sintagma: SPrep-CN
    pasos:
      - id: 1
        busca: verbo
        pista: "Esta oración tiene una perífrasis verbal pasiva: 'ser + participio'. Busca ambas formas."
        tokens_correctos: ["fueron", "analizadas"]
        feedback_ok: "Correcto. La perífrasis pasiva 'fueron analizadas' es el núcleo del predicado."
        feedback_error: "En la pasiva, el verbo tiene dos partes: el auxiliar 'ser' conjugado + el participio del verbo principal."
      - id: 2
        busca: sujeto
        pista: "En una oración pasiva, el sujeto recibe la acción en lugar de realizarla. ¿Qué cosa fue analizada?"
        tokens_correctos: ["Las", "pruebas"]
        feedback_ok: "Exacto. 'Las pruebas' es el sujeto paciente: recibe la acción pero concuerda con el verbo."
        feedback_error: "En la pasiva el sujeto no actúa, recibe la acción. ¿Qué fue analizado? Eso es el sujeto."
      - id: 3
        busca: complemento-agente
        pista: "¿Quién realizó la acción? En la pasiva, el agente va introducido por la preposición 'por'."
        tokens_correctos: ["por", "los", "investigadores", "del", "laboratorio"]
        feedback_ok: "Bien. El complemento agente es 'por los investigadores del laboratorio'. Es exclusivo de las oraciones pasivas."
        feedback_error: "En la pasiva, quien realiza la acción aparece introducido por 'por'. No es un CC: es el complemento agente."

  - id: 5
