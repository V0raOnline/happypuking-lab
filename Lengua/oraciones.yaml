        categoria: sustantivo
        subtipo: comun
        funcion: nucleo-CReg
        sintagma: SPrep-CReg
    pasos:
      - id: 1
        busca: verbo
        pista: "Esta oración tiene dos verbos coordinados. Búscalos ambos. El 'se' forma parte del segundo verbo."
        tokens_correctos: ["llegaron", "se", "quejaron"]
        feedback_ok: "Correcto. Dos verbos coordinados: 'llegaron' y 'se quejaron' (verbo pronominal: el 'se' es parte del verbo, no reflexivo)."
        feedback_error: "Hay dos acciones. El 'se' no es reflexivo aquí — 'quejarse' es un verbo pronominal que siempre lleva 'se'."
      - id: 2
        busca: CPred
        pista: "¿Cómo llegaron? Busca un adjetivo que describa al sujeto en el momento de la acción. Si concuerda con el sujeto, es CPred, no CCM."
        tokens_correctos: ["agotados"]
        feedback_ok: "Exacto. 'Agotados' es un CPred del sujeto: es adjetivo, concuerda con 'los excursionistas' y podría parafrasearse como 'llegaron y estaban agotados'."
        feedback_error: "Pregunta: ¿'agotado' o 'agotadamente'? Como es adjetivo que concuerda con el sujeto, es CPred, no CCM."
      - id: 3
        busca: CReg
        pista: "El verbo 'quejarse' exige la preposición 'de'. Ese complemento no es un CC: es el CRég, exigido por el verbo."
        tokens_correctos: ["del", "intenso", "frío"]
        feedback_ok: "Bien. 'Del intenso frío' es el CRég: la preposición 'de' la exige el propio verbo 'quejarse de algo'. No puede suprimirse ni cambiarse."
        feedback_error: "Prueba: ¿puedes suprimir 'del frío' y que la oración tenga sentido? 'Se quejaron...' queda incompleto. Eso indica que es CRég, no CC."

