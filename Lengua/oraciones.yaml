    nota: "Oración coordinada. CPred del sujeto. CRég. Verbo pronominal. CCM."
    trampa: "'Agotados' parece CCM pero es CPred (concuerda con el sujeto). 'Del intenso frío' parece CC pero es CRég exigido por 'quejarse de'."
