        tokens_correctos: ["vive", "encontraron"]
        feedback_ok: "Correcto. Dos verbos: 'vive' (primera proposición) y 'encontraron' (segunda)."
        feedback_error: "Busca los dos núcleos verbales, uno en cada parte de la oración coordinada."
      - id: 2
        busca: se-impersonal
        pista: "En 'se vive', ¿puedes encontrar el sujeto? Prueba a poner el verbo en plural: ¿'se viven'? Si no funciona, es impersonal."
        tokens_correctos: ["se", "vive"]
        feedback_ok: "Exacto. 'Se vive' es impersonal: el verbo no puede ir en plural y no hay sujeto posible. El 'se' es marca de impersonalidad."
        feedback_error: "Intenta: ¿'se viven tranquilamente'? Suena mal. Eso indica que es impersonal — no tiene sujeto."
      - id: 3
        busca: sujeto-pasiva
        pista: "En 'se encontraron', prueba el plural: ¿qué palabra hace que el verbo vaya en plural? Eso es el sujeto paciente."
