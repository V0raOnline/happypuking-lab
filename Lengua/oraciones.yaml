        feedback_ok: "Perfecto. 'Las llaves del almacén' es el sujeto paciente: 'se encontraron las llaves' (plural) porque el sujeto es plural. Es una pasiva refleja."
        feedback_error: "Prueba: ¿'se encontró la llave'? Sí funciona. Eso significa que 'las llaves' concuerda con el verbo — es el sujeto de una pasiva refleja."

