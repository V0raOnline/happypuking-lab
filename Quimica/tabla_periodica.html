// Fill in elements
ELEMENTS.forEach(e => {

  const pos = positions[num];
  if (!pos) return;
  const key = `${pos.row}-${pos.col}`;
  const div = cells[key];
  if (!div) return;
  const color = CATS[cat]?.color || '#888';
  div.className = 'el';
  div.dataset.num = num;
  div.dataset.cat = cat;
  div.style.setProperty('--cat-color', color);
  div.innerHTML = `
    <div class="el-number">${num}</div>
    <div class="el-symbol">${sym}</div>
    <div class="el-name">${name}</div>
    <div class="el-mass">${mass}</div>
  `;
  div.onclick = () => selectElement(num);
});

// Add La/Ac reference indicators in main table
function addIndicator(row, col, text, color) {
  const key = `${row}-${col}`;
  const div = cells[key];
  if (!div) return;
  div.className = 'el';
  div.style.setProperty('--cat-color', color);
  div.style.fontSize = '0.5rem';
  div.style.opacity = '0.5';
  div.style.cursor = 'default';
  div.innerHTML = `<div style="font-family:'DM Mono',monospace;font-size:0.45rem;color:${color};text-align:center;padding:2px;line-height:1.3">${text}</div>`;
}

// Select element
let activeNum = null;

function selectElement(num) {
  if (atomAnimId) { cancelAnimationFrame(atomAnimId); atomAnimId = null; }
  if (activeNum) {
    const prev = document.querySelector(`.el[data-num="${activeNum}"]`);
    if (prev) prev.classList.remove('active');
  }
  activeNum = num;
  const cur = document.querySelector(`.el[data-num="${num}"]`);
  if (cur) cur.classList.add('active');
  renderCard(num);
}

const SHELL_NAMES = ['K','L','M','N','O','P','Q'];

function renderCard(num) {
  const e = elMap[num];
  if (!e) return;
  const [n, sym, name, mass, cat, group, period, origin, apps] = e;
  const color = CATS[cat]?.color || '#888';
  const catLabel = CATS[cat]?.label || cat;
  const extra = EXTRA[n] || [[],null];
  const [shells, en] = extra;

  // Electronegativity bar (Pauling scale 0–4)
  const enPct = en ? Math.min(en / 4.0 * 100, 100).toFixed(1) : 0;
  const enHTML = en != null ? `
    <div class="en-bar-wrap">
      <div style="display:flex;align-items:baseline;gap:0.5rem">
        <span class="en-value" style="color:${color}">${en}</span>
        <span class="en-scale-label">escala Pauling (0 – 4)</span>
      </div>
      <div class="en-bar-track">
        <div class="en-bar-fill" id="en-fill" style="width:${enPct}%;background:linear-gradient(90deg,color-mix(in srgb,${color} 40%,#1A1D27),${color})">
          <div class="en-bar-thumb" style="background:${color};--accent-col:${color}"></div>
        </div>
      </div>
      <div class="en-labels">
        <span>0 — Cs (0.79)</span>
        <span>F (3.98) — 4</span>
      </div>
    </div>
  ` : `<span style="color:var(--muted);font-style:italic;font-size:0.8rem">Sin dato (elemento sintético o gas noble)</span>`;

  // Shell chips
  const shellChips = shells.map((count, i) => count > 0 ? `
    <div class="shell-chip" style="border-color:color-mix(in srgb,${color} 30%,transparent)">
      <span class="shell-letter" style="color:${color}">${SHELL_NAMES[i]}</span>
      <span class="shell-count" style="color:${color}">${count}</span>
    </div>
  ` : '').join('');

  document.getElementById('card').innerHTML = `
    <div class="card-header" style="--accent:${color}">
      <div class="card-number">N.º ${n} · Período ${period} · Grupo ${group}</div>
      <div class="card-symbol-row">
        <div class="card-symbol">${sym}</div>
        <div>
          <div class="card-name">${name}</div>
          <div class="card-cat">${catLabel}</div>
          <div style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);margin-top:0.3rem">Masa atómica: <span style="color:${color}">${mass} u</span></div>
        </div>
      </div>
    </div>
    <div class="card-body">

      <div class="card-section">
        <div class="section-label" style="color:${color}">Estructura atómica</div>
        <div class="atom-viz">
          <canvas id="atom-canvas" width="220" height="220"></canvas>
        </div>
        <div class="econfig-row" style="margin-top:0.5rem">
          ${shellChips}
        </div>
        <div style="font-size:0.68rem;color:var(--muted);margin-top:0.35rem;font-family:'DM Mono',monospace">
          ${n} protones · ${Math.round(parseFloat(mass)) - n || '?'} neutrones (aprox.)
        </div>
      </div>

      <div class="card-section">
        <div class="section-label" style="color:${color}">Electronegatividad</div>
        ${enHTML}
      </div>

      <div class="card-section">
        <div class="section-label" style="color:${color}">Origen del nombre</div>
        <div class="section-text">${origin}</div>
      </div>

      <div class="card-section">
        <div class="section-label" style="color:${color}">Usos y aplicaciones</div>
        <div class="app-tags">
          ${apps.map(a => `<span class="app-tag" style="background:color-mix(in srgb,${color} 14%,var(--surface2));border-color:color-mix(in srgb,${color} 35%,transparent);color:${color}">${a}</span>`).join('')}
        </div>
      </div>

    </div>
  `;

  // Draw atom after DOM update
  requestAnimationFrame(() => drawAtom(n, shells, color));
}

// ── ATOM CANVAS RENDERER ──
let atomAnimId = null;

function drawAtom(atomicNum, shells, color) {
  if (atomAnimId) cancelAnimationFrame(atomAnimId);
  const canvas = document.getElementById('atom-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;

  // Filter shells that have electrons
  const activeLayers = shells.map((n,i) => ({name: SHELL_NAMES[i], count: n, idx: i})).filter(s => s.count > 0);
  // Show max 5 shells visually (collapse the rest into label only, display is illustrative)
  const displayLayers = activeLayers.slice(0, 5);

  const minR = 18, gap = (Math.min(W, H)/2 - minR - 8) / Math.max(displayLayers.length, 1);
  const radii = displayLayers.map((_, i) => minR + gap * (i + 1) - gap * 0.3);

  // Electron angles — each shell rotates at different speed
  const speeds = [0.018, 0.012, 0.008, 0.006, 0.004];
  const angles = displayLayers.map(() => 0);
  const startTime = performance.now();

  // Hex to RGB helper
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
  }
  const rgb = hexToRgb(color);

  function frame(ts) {
    const elapsed = (ts - startTime) / 1000;
    ctx.clearRect(0, 0, W, H);

    // Nucleus glow
    const glowR = minR + 6;
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
    grd.addColorStop(0, `rgba(${rgb},0.5)`);
    grd.addColorStop(0.5, `rgba(${rgb},0.2)`);
    grd.addColorStop(1, `rgba(${rgb},0)`);
    ctx.beginPath();
    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Nucleus
    ctx.beginPath();
    ctx.arc(cx, cy, minR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${rgb},0.25)`;
    ctx.fill();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = `rgba(${rgb},0.7)`;
    ctx.stroke();

    // Atomic number label inside nucleus
    ctx.fillStyle = color;
    ctx.font = `bold ${Math.max(8, Math.min(13, minR * 0.85))}px 'DM Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(atomicNum <= 999 ? atomicNum : '...', cx, cy);

    // Orbits + electrons
    displayLayers.forEach((layer, i) => {
      const r = radii[i];
      const speed = speeds[i];

      // Orbit ring
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${rgb},0.14)`;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Electrons on this shell
      const count = Math.min(layer.count, 8); // max 8 shown visually
      for (let j = 0; j < count; j++) {
        const baseAngle = (Math.PI * 2 * j / count);
        const angle = baseAngle + elapsed * speed * (i % 2 === 0 ? 1 : -1) * (i + 1) * 0.8;
        const ex = cx + r * Math.cos(angle);
        const ey = cy + r * Math.sin(angle);

        // Electron glow
        const eg = ctx.createRadialGradient(ex, ey, 0, ex, ey, 5);
        eg.addColorStop(0, `rgba(${rgb},0.9)`);
        eg.addColorStop(1, `rgba(${rgb},0)`);
        ctx.beginPath();
        ctx.arc(ex, ey, 5, 0, Math.PI * 2);
        ctx.fillStyle = eg;
        ctx.fill();

        // Electron dot
        ctx.beginPath();
        ctx.arc(ex, ey, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      }

      // Shell label
      const labelAngle = elapsed * speeds[i] * (i % 2 === 0 ? 1 : -1) * (i + 1) * 0.8 - Math.PI * 0.15;
      const lx = cx + (r + 9) * Math.cos(labelAngle);
      const ly = cy + (r + 9) * Math.sin(labelAngle);
      ctx.font = `600 8px 'DM Mono', monospace`;
      ctx.fillStyle = `rgba(${rgb},0.5)`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(layer.name, lx, ly);
    });

    atomAnimId = requestAnimationFrame(frame);
  }

  atomAnimId = requestAnimationFrame(frame);
}

// Filter by category
let activeFilter = null;
function filterCat(cat) {
  if (activeFilter === cat) {
    activeFilter = null;
    document.querySelectorAll('.el[data-cat]').forEach(e => e.classList.remove('dimmed'));
    document.querySelectorAll('.legend-item').forEach(l => l.style.opacity = '1');
  } else {
    activeFilter = cat;
    document.querySelectorAll('.el[data-cat]').forEach(e => {
      e.classList.toggle('dimmed', e.dataset.cat !== cat);
    });
    document.querySelectorAll('.legend-item').forEach(l => {
      l.style.opacity = l.dataset.cat === cat ? '1' : '0.35';
    });
  }
}

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) {
    document.querySelectorAll('.el[data-num]').forEach(e => e.classList.remove('dimmed'));
    return;
  }
  document.querySelectorAll('.el[data-num]').forEach(el => {
    const num = parseInt(el.dataset.num);
    const e = elMap[num];
    if (!e) return;
    const match = e[1].toLowerCase().includes(q) || e[2].toLowerCase().includes(q) || String(e[0]).includes(q);
    el.classList.toggle('dimmed', !match);
    if (match && !el.classList.contains('dimmed')) {
      // auto-select first match
    }
  });
  // Auto-select first match
  const first = ELEMENTS.find(e => e[1].toLowerCase().includes(q) || e[2].toLowerCase().includes(q));
  if (first) selectElement(first[0]);
});
